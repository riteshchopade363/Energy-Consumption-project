<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Consumption Result</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
        }

        h1 {
            margin: 10px 0;
            color: #333;
        }

        .result {
            font-size: 32px;
            font-weight: bold;
            color: #2ecc71;
            margin-top: 20px;
        }

        .label {
            font-size: 20px;
            color: #555;
        }

        .btn {
            margin-top: 25px;
            padding: 10px 20px;
            border: none;
            background-color: #4facfe;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #007bff;
        }
    </style>
</head>

<body>

<div class="container">
    <h1 class="label">Energy Consumption is :</h1>
    <div class="result">{{energy_value}}</div>
    <h3>Units</h3>

    <form action="form.html">
        <button class="btn">Go Back</button>
    </form>
</div>

</body>
</html>
